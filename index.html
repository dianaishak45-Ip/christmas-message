<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> مؤتمر انا عارف </title>
<style>
    body {
          margin: 0;
    min-height: 100vh;
    font-family: "Cairo", sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background-image: url('BG_2.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow-x: hidden;
    position: relative;
    }

    /* النجوم */
    .star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s infinite ease-in-out;
    }
    @keyframes twinkle { 0%,100% { opacity:0.2;} 50% {opacity:1;} }

    /* العنوان */
    #title {
       font-size: 6vw;
    color: #ffd700;
    text-align: center;
    text-shadow: 0 0 12px rgba(0,0,0,1),0 0 25px rgba(0,0,0,0.9);
    margin: 2vh 0;
    max-width: 90%;
    }

    /* صندوق الرسالة */
    #messageBox {
        width: 80%;
    max-width: 500px;
    font-size: 4vw;
    padding: 2vh 2vw;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 25px rgba(255,255,255,0.5);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 1s ease-in-out;
    background: rgba(0,0,0,0.65);
    word-wrap: break-word;
    white-space: normal;
    text-align: center;
    box-sizing: border-box;
    margin-bottom: 3vh;
    }

    /* زر الظرف */
    #revealBtn {
       width: 40%;
    max-width: 150px;
    height: 50px;
    background: #ffd700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 4vw;
    font-weight: bold;
    color: black;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    margin-bottom: 3vh;
    transition: transform 0.3s ease;
    }
    #revealBtn:hover { transform: scale(1.1); }

    /* فورم الطلبة */
    #wishForm{
       width: 80%;
    max-width: 400px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease, transform 1s ease;
    transform: translateY(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 5vh;
    }
    #wishForm.show{
        opacity:1;
        transform: translateY(0);
        pointer-events:auto;
    }
    #wishForm textarea{
    width: 100%;
    min-height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 4vw;
    resize: none;
    text-align: right;
    }
    #sendBtn{
       margin-top: 10px;
    padding: 10px 20px;
    font-size: 4vw;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    }

    /* الثلج */
    .snowflake {
        position: absolute;
        top: -10px;
        width: 5px;
        height: 5px;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        pointer-events: none;
        animation: fall linear infinite;
    }
    @keyframes fall { 0%{transform:translateY(0) rotate(0deg);}100%{transform:translateY(100vh) rotate(360deg);} }

    @media (max-width: 600px) {
       #title { font-size: 8vw; }
    #messageBox { font-size: 5vw; }
    #revealBtn { font-size: 5vw; height: 45px; }
    #wishForm textarea { font-size:5vw; height:80px; }
    #sendBtn { font-size:5vw; }
    }


</style>
</head>
<body>

<div id="title"> مؤتمر انا عارف </div>
<div id="messageBox">تُحمَّل رسالتك الآن...</div>
<button id="revealBtn">افتح الرسالة</button>

<div id="wishForm">
    <textarea id="wishText" placeholder="ماذا تقول لربنا اليوم"></textarea>
    <button id="sendBtn">إرسال الطلبة ✨</button>
</div>


<script>
  
 

    const messages = [
        "أَنَا أَعْرِفُ أَعْمَالَكَ وَضِيْقَتَكَ وَفَقْرَكَ مَعَ أَنَّكَ غَنِيٌّ",
        " لَا تَخَفِ الْبَتَّةَ مِمَّا أَنْتَ عَتِيدٌ أَنْ تَتَأَلَّمَ بِهِ ",
        " كُنْ أَمِينًا إِلَى الْمَوْتِ فَسَأُعْطِيكَ إِكْلِيلَ الْحَيَاةِ"
,
     "مَنْ يَغْلِبُ فَلَا يُؤْذِيهِ الْمَوْتُ الثَّانِي"
];



    
    const btn = document.getElementById("revealBtn");
    const msgBox = document.getElementById("messageBox");
    const form = document.getElementById("wishForm");

    btn.addEventListener("click", () => {
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        msgBox.textContent = randomMsg;
        msgBox.style.opacity = 1;
       
        btn.style.display = "none";
        setTimeout(()=>{ form.classList.add("show"); },1500);
    });

    document.getElementById("sendBtn").addEventListener("click",()=>{
        const wish=document.getElementById("wishText").value.trim();
        if(!wish){alert("اكتب الطلبة الأول 🙏");return;}
        fetch("https://script.google.com/macros/s/AKfycbyhjax85TJIOyuKvbsOkNYwRx5rYq7M0Vonq40-zfL__Ge817-in-_rDnZo2rmhzzQf/exec",
        {method:"POST",body:JSON.stringify({wish:wish})})
        .then(res=>alert("💛 تم إرسال الطلبة بنجاح — ربنا يسمعك!"))
        .catch(err=>alert("Error: "+err));
    }); 
   

</script>
</body>
</html>
